name: CI - Dev & Stage

on:
  push:
    branches: [dev, stage]
  pull_request:
    branches: [dev, stage]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload build artifacts (stage only)
        if: github.ref == 'refs/heads/stage'
        uses: actions/upload-artifact@v4
        with:
          name: bluedoor-platform-build
          path: |
            apps/**/dist
            services/**/dist
            packages/**/dist

      - name: Deploy to Railway (dev)
        if: github.ref == 'refs/heads/dev'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_DEV }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID_DEV }}
        run: |
          npm install -g @railway/cli
          railway link --project "$RAILWAY_PROJECT_ID"
          railway up --detach

      - name: Deploy to Railway (stage)
        if: github.ref == 'refs/heads/stage'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGE }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID_STAGE }}
        run: |
          npm install -g @railway/cli
          railway link --project "$RAILWAY_PROJECT_ID"
          railway up --detach
