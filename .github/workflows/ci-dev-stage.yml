name: CI - Dev & Stage
on:
  push: { branches: [dev, stage] }
  pull_request: { branches: [dev, stage] }
concurrency: { group: deploy-${{ github.ref }}, cancel-in-progress: true }
jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: node -v && pnpm -v
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: Deploy (dev)
        if: github.ref == 'refs/heads/dev'
        env: { RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_DEV }} }
        run: |
          npm i -g @railway/cli
          railway up --detach
      - name: Deploy (stage)
        if: github.ref == 'refs/heads/stage'
        env: { RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGE }} }
        run: |
          npm i -g @railway/cli
          railway up --detach
