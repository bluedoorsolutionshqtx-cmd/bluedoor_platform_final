name: CI - Prod

on:
  push:
    branches: [prod]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bluedoor-platform-build
          path: |
            apps/**/dist
            services/**/dist
            packages/**/dist

  deploy-prod:
    needs: build-test
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://client.bluedoorsolutionsllc.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway (prod)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROJECT_TOKEN_PROD }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID_PROD }}
        run: |
          npm install -g @railway/cli
          railway link --project "$RAILWAY_PROJECT_ID"
          railway up --detach
