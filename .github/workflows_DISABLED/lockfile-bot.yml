name: Lockfile Bot (dev)

on:
  push:
    branches: [dev]
    paths:
      - "package.json"
      - "pnpm-workspace.yaml"
      - "services/**/package.json"
      - "packages/**/package.json"

permissions:
  contents: write

concurrency:
  group: lockfile-bot-dev
  cancel-in-progress: true

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install (update lockfile)
        run: pnpm install --no-frozen-lockfile

      - name: Commit lockfile if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "bluedoor-lockfile-bot"
          git config user.email "bluedoor-lockfile-bot@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore(lockfile): update pnpm-lock.yaml"
          git push
